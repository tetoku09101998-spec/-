<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>総合・ライナー構文ジェネレーター</title>
<style>
    body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
    .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    label { display: block; margin-top: 15px; font-size: 0.9em; font-weight: bold; color: #333; }
    select, input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .btn-group { display: flex; gap: 10px; margin-top: 25px; }
    button { color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; font-size: 1em; transition: 0.2s; }
    #generateBtn { background: #b30000; }
    #generateBtn:hover { background: #800000; }
    #copyBtn { background: #333; }
    #copyBtn:hover { background: #555; }
    .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #b30000; min-height: 4em; white-space: pre-wrap; line-height: 1.6; }
</style>
</head>
<body>

<div class="container">
    <h3 style="text-align: center; color: #b30000;">総合・ライナー構文ジェネレーター</h3>
    
    <label>構文のパターン:</label>
    <select id="pattern" onchange="updateFields()">
        <option value="affirm">基本形（全肯定からの自責ループ）</option>
        <option value="apology">謝罪カウンター（時代や環境のせいじゃなくて…）</option>
        <option value="sacrifice">変則形１（英雄的自己犠牲）</option>
        <option value="anger">変則形２（唐突なマジギレ）</option>
        <option value="responsibility">変則形３（責任転嫁＆自爆）</option>
        <option value="creepy">追加：何度見ても美しい構文</option>
        <option value="regret">追加：後悔と謝罪の放棄（あの日…もし引き返していたら）</option>
        <option value="reveal">追加：唐突なカミングアウト（俺が鎧の巨人で…）</option>
        <option value="decisive">追加：決戦の合図（やるんだな！？今…！ここで！）</option>
    </select>

    <div id="input-area"></div>

    <div class="btn-group">
        <button id="generateBtn" onclick="generateText()">出力するんだな！？</button>
        <button id="copyBtn" onclick="copyToClipboard()">結果をコピー</button>
    </div>

    <div class="result" id="output">（ここに結果が出ます）</div>
</div>

<script>
    const templates = {
        affirm: {
            fields: [{id: "arg1", label: "相手の名前", default: "ガリアード"}],
            generate: (args) => `その通りだ${args[0]} お前の言ってることは全て正しい\n…すまない\nあぁ…そうだ…あぁ\nあぁ それでいい わかっている…\nもう嫌なんだ 自分が… 俺を殺してくれ もう消えたい`
        },
        apology: {
            fields: [
                {id: "arg1", label: "相手の名前", default: "エレン"},
                {id: "arg2", label: "言い訳", default: "時代や環境"},
                {id: "arg3", label: "悲劇的な出来事", default: "お前の母親が巨人に食われた"}
            ],
            generate: (args) => `違う!!違うんだ${args[0]}…!!\n…あれは…${args[1]}のせいじゃなくて俺が悪いんだよ。${args[2]}のは俺のせいだ!!\n許さないでくれ 俺は… 本当にどうしようもない`
        },
        sacrifice: {
            fields: [{id: "arg1", label: "引き受ける場所・役割", default: "ここは"}],
            generate: (args) => `${args[0]}俺が!!\n俺は務めを果たした もう…任せても…いいよな`
        },
        anger: {
            fields: [{id: "arg1", label: "冒涜されたもの", default: "九つの巨人を継承する名誉"}],
            generate: (args) => `今…お前…何って言った？\n"${args[0]}"を冒涜したのか？`
        },
        responsibility: {
            fields: [
                {id: "arg1", label: "共犯者", default: "アニ"},
                {id: "arg2", label: "原因となった行動", default: "壁を破壊した"}
            ],
            generate: (args) => `${args[0]}は俺の命令にしたがっただけだ\n俺たちがあの日…${args[1]}からだ…`
        },
        creepy: {
            fields: [
                {id: "arg1", label: "人名（誰の）", default: "ヒストリア"},
                {id: "arg2", label: "対象（何を）", default: "筆跡"},
                {id: "arg3", label: "追加情報", default: "いい匂いもする"}
            ],
            generate: (args) => `何度見ても${args[0]}の${args[1]}は美しいな…${args[2]}`
        },
        regret: {
            fields: [
                {id: "arg1", label: "分岐点となった行動", default: "引き返していたら"},
                {id: "arg2", label: "巻き込んだ相手", default: "お前もベルトルトも"},
                {id: "arg3", label: "失われた未来", default: "故郷に帰って家族に会えたのに"},
                {id: "arg4", label: "放棄する行動", default: "謝る"}
            ],
            generate: (args) => `あの日…もし${args[0]}、${args[1]}…${args[2]}…${args[3]}ことすらおこがましく思える`
        },
        reveal: {
            fields: [
                {id: "arg1", label: "自分の正体", default: "鎧の巨人"},
                {id: "arg2", label: "相棒の正体", default: "超大型巨人"}
            ],
            generate: (args) => `俺が${args[0]}で、こいつが${args[1]}ってやつだ。`
        },
        decisive: {
            fields: [
                {id: "arg1", label: "決めること（●●）", default: "勝負"}
            ],
            generate: (args) => `やるんだな！？今…！ここで！\nああ！！${args[0]}は今！！ここで決める！！`
        }
    };

    function updateFields() {
        const pattern = document.getElementById('pattern').value;
        const config = templates[pattern];
        const inputArea = document.getElementById('input-area');
        inputArea.innerHTML = '';
        
        config.fields.forEach((field, index) => {
            inputArea.innerHTML += `<label>${field.label}:</label><input type="text" id="input_${index}" value="${field.default}">`;
        });
    }

    function generateText() {
        const pattern = document.getElementById('pattern').value;
        const config = templates[pattern];
        const args = config.fields.map((_, index) => document.getElementById(`input_${index}`).value);
        document.getElementById('output').innerText = config.generate(args);
        
        // 生成時にコピーボタンのテキストを元に戻す
        document.getElementById('copyBtn').innerText = '結果をコピー';
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        if (text === '（ここに結果が出ます）') return; // 初期状態はコピーしない
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'コピー完了！';
        }).catch(err => {
            alert('コピーに失敗したわ。手動でやりなさい。');
        });
    }

    // 初期化
    updateFields();
</script>

</body>
</html>
